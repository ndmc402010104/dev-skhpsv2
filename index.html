<!DOCTYPE html>
<!--
檔案位置：skhpsv2/index.html
時間戳記：2026-06-16 13:20 UTC+8
用途：整外資訊系統首頁。

本版調整：
- 保留 skhpsv2 本體首頁入口架構，由 assets/js/skhps-entry.js 作為唯一入口。
- loading 階段只載唯一固定 loading CSS：assets/css/skhps-loading.css。
- 首頁主視覺回到 Theme40 大標題 + 大入口卡片版本。
- 移除首頁主畫面的 external apps status 文字，不顯示「已載入 N 個外部專案（env）」。
- 中間入口面板保留 Theme40 卡片式入口容器，外部專案仍由 external-apps-runtime 動態渲染。

Loading Gate：
- 首頁使用 AND gate。
- 必須等待：
  1. css-runtime
  2. external-apps-runtime
- skhps-shell 不寫在 HTML，由 entry-core.js 動態 require / done。
- 任何任務成功或失敗都必須回報 loading gate。

重要規則：
- 首頁不是外部專案，不載入 app-entry.js。
- 首頁不會 registerExternalApp。
- 首頁不放 inline CSS。
- 首頁不直接載入共通 runtime scripts。
- 首頁只提供語意結構與 class，正式樣式由 CSS Sheet / css-sheet-runtime.js / cache 管理。
- loading 階段樣式只由 assets/css/skhps-loading.css 管理。
-->
<html
  lang="zh-Hant"
  class="skhps-loading skhps-css-loading skhps-shell-loading skhps-main-loading"
  data-skhps-entry-scope="skhps-core"
  data-skhps-page-id="index"
  data-skhps-page-map-current="首頁"
  data-loading-title="整外資訊系統首頁"
  data-skhps-loading-tasks="css-runtime,external-apps-runtime"
  data-skhps-shell-ready="false"
  data-skhps-page-ready="false"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">

  <script>
    (function () {
      "use strict";

      var host = String(location.hostname || "").toLowerCase();
      var isDev =
        host === "127.0.0.1" ||
        host === "localhost" ||
        host.indexOf("dev-skhps") >= 0;

      var version = isDev ? String(Date.now()) : "prod";

      // 2026-07-17：暖砂/Theme40 切換第一幀背景閃色修正。
      // loading CSS 早於 CSS Registry 完成前就先畫出來，本來只有暖砂一種
      // 硬編色，切到 theme40 預覽時第一幀還是先閃暖色。這裡在 loading CSS
      // 掛上去之前，同步（不等網路）讀 localStorage 的主題預覽值，先把
      // data-skhps-loading-theme 標記寫到 <html>，loading CSS 再用這個
      // 屬性覆蓋三個背景 token，只影響非預設主題，暖砂本身流程不變。
      try {
        var previewTheme = String(localStorage.getItem("skhpsv2.themePreview.v1") || "").trim();
        if (previewTheme && previewTheme !== "warm-sand") {
          document.documentElement.setAttribute("data-skhps-loading-theme", previewTheme);
        }
      } catch (loadingThemeError) { /* localStorage 讀不到就維持預設暖砂 loading */ }

      // 2026-07-23：gate 外觀 token 化。第一幀(不等網路)讀 localStorage 的 loading token 包，inline 注入
      // 5 個 CSS 變數→gate 跟著當前 theme 走。沒有就用 skhps-loading.css 的 fallback(暖砂)＝prod 零風險。
      try {
        var loadingTheme = JSON.parse(localStorage.getItem("skhpsv2.loadingTheme.v1") || "null");
        if (loadingTheme && typeof loadingTheme === "object") {
          var ltEl = document.documentElement;
          var ltMap = {
            pageBg: "--skhps-loading-page-bg",
            pageBgMid: "--skhps-loading-page-bg-mid",
            pageBgEnd: "--skhps-loading-page-bg-end",
            accent: "--skhps-loading-accent",
            text: "--skhps-loading-text"
          };
          for (var ltKey in ltMap) {
            if (ltMap.hasOwnProperty(ltKey) && loadingTheme[ltKey]) {
              ltEl.style.setProperty(ltMap[ltKey], String(loadingTheme[ltKey]));
            }
          }
        }
      } catch (loadingTokenError) { /* 壞掉就用 fallback 暖砂 */ }

      document.write(
        '<link rel="stylesheet" href="assets/css/skhps-loading.css?v=' +
        encodeURIComponent(version) +
        '">'
      );

      document.write(
        '<script src="assets/js/skhps-entry.js?v=' +
        encodeURIComponent(version) +
        '"><\/script>'
      );
    })();
  </script>

  <title>整外資訊系統首頁</title>
</head>

<body class="skhps-body">
  <!-- Header 由 skhpsv2 共用 header.js 掛載 -->
  <header id="header" class="skhps-header" data-skhps-header></header>

  <main class="skhps-page skhps-index-page" data-skhps-main>
    <nav class="skhps-page-map" aria-label="breadcrumb">
      <span class="skhps-page-map-current">首頁</span>
    </nav>

    <section class="skhps-hero skhps-index-hero" aria-labelledby="indexTitle">
      <p class="skhps-eyebrow">常用功能集中入口</p>

      <h1 id="indexTitle" class="skhps-page-title skhps-index-title">
        把簽到、院內系統快速登入與敷料領用放在同一個工作台。
      </h1>

      <p class="skhps-page-subtitle skhps-index-subtitle">
        選擇下方功能即可進入對應頁面。首頁保留清楚的入口面板，方便值班與行政流程快速切換。
      </p>

      <article class="skhps-entry-panel skhps-system-entry-card" aria-labelledby="externalAppsTitle">
        <div class="skhps-entry-panel-head skhps-section-head skhps-index-section-head">
          <div>
            <h2 id="externalAppsTitle" class="skhps-section-title skhps-entry-panel-title">
              請選擇要使用的功能
            </h2>
            <p class="skhps-section-description skhps-entry-panel-description">
              依照目前作業情境進入對應表單或工具。
            </p>
          </div>
        </div>

        <nav
          class="skhps-entry-list skhps-external-apps-grid"
          aria-label="系統入口"
          data-skhps-external-apps
        ></nav>

        <nav class="skhps-entry-list skhps-external-apps-grid" aria-label="工具">
          <a class="skhps-entry-card" href="tools.html">
            <span class="skhps-entry-card-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13.5" r="7"></circle><path d="M12 13.5V9.8M9.5 2.5h5M12 2.5v2"></path></svg>
            </span>
            <span class="skhps-entry-card-body">
              <strong class="skhps-entry-card-title">跳台工具</strong>
              <span class="skhps-entry-card-desc">18:00 跳台倒數自動送出。</span>
            </span>
            <span class="skhps-entry-card-arrow" aria-hidden="true">→</span>
          </a>
        </nav>
      </article>
    </section>
  </main>

  <footer id="footer" data-skhps-footer class="skhps-footer">
    Footer 載入中...
  </footer>
</body>
</html>
